<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Roblox Info Extractor - Historial Completo de Nombres</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            min-height: 100vh;
            background: radial-gradient(ellipse at center, #0a0a0a 0%, #000000 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .universe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            opacity: 0;
            animation: universeFadeIn 1.5s ease-out forwards;
        }

        @keyframes universeFadeIn {
            to { opacity: 1; }
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            will-change: opacity, transform;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .shooting-star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: linear-gradient(45deg, #fff, transparent);
            border-radius: 50%;
            will-change: transform;
        }

        @keyframes shoot {
            0% { transform: translateX(0) translateY(0); opacity: 1; }
            100% { transform: translateX(400px) translateY(400px); opacity: 0; }
        }

        .nebula {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(100, 80, 200, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(200, 100, 150, 0.08) 0%, transparent 50%);
            animation: nebulaPulse 8s ease-in-out infinite;
        }

        @keyframes nebulaPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .floating-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            will-change: transform, opacity;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) translateX(0) scale(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100vh) translateX(50px) scale(1); opacity: 0; }
        }

        .container {
            width: 100%;
            max-width: 900px;
            position: relative;
            z-index: 10;
            opacity: 0;
            transform: translateY(40px) scale(0.95);
            filter: blur(10px);
            animation: containerCinematicIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
        }

        @keyframes containerCinematicIn {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
            opacity: 0;
            transform: translateY(-10px);
            animation: slideDownFade 0.6s ease-out 0.5s forwards;
        }

        @keyframes slideDownFade {
            to { opacity: 1; transform: translateY(0); }
        }

        .header h1 {
            color: #ffffff;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 3px;
            margin-bottom: 12px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            animation: titlePulse 2s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { text-shadow: 0 0 10px rgba(255, 255, 255, 0.3); }
            50% { text-shadow: 0 0 30px rgba(255, 255, 255, 0.6); }
        }

        .header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            letter-spacing: 1px;
        }

        .search-card {
            background: rgba(10, 10, 10, 0.75);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 32px;
            padding: 35px 40px;
            margin-bottom: 30px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .search-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 35px 70px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.2);
        }

        .input-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            stroke: rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
            pointer-events: none;
        }

        input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            background: rgba(255, 255, 255, 0.06);
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 18px;
            color: #ffffff;
            font-size: 16px;
            font-weight: 500;
            outline: none;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.25);
            font-weight: 400;
        }

        input:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
        }

        input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.1);
            transform: scale(1.01);
        }

        .search-btn {
            padding: 16px 32px;
            background: linear-gradient(135deg, #3a3a3a 0%, #2a2a2a 100%);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 18px;
            font-size: 15px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            white-space: nowrap;
        }

        .search-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s ease;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #4a4a4a 0%, #3a3a3a 100%);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .search-btn:hover::before {
            left: 100%;
        }

        .search-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            display: none;
            animation: statusPop 0.3s ease-out;
        }

        @keyframes statusPop {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .status.show {
            display: block;
        }

        .status.loading {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .status.success {
            background: rgba(74, 222, 128, 0.12);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.3);
        }

        .status.error {
            background: rgba(248, 113, 113, 0.12);
            color: #f87171;
            border: 1px solid rgba(248, 113, 113, 0.3);
            animation: errorShake 0.4s ease;
        }

        @keyframes errorShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .results-card {
            background: rgba(10, 10, 10, 0.75);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 32px;
            padding: 35px 40px;
            display: none;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .results-card.show {
            display: block;
            animation: slideUpFade 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-header {
            display: flex;
            gap: 30px;
            margin-bottom: 35px;
            flex-wrap: wrap;
            animation: fadeInScale 0.5s ease-out;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .avatar-placeholder {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            animation: avatarGlow 2s ease-in-out infinite;
        }

        @keyframes avatarGlow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.2); }
            50% { box-shadow: 0 0 20px 5px rgba(255, 255, 255, 0.3); }
        }

        .profile-info {
            flex: 1;
        }

        .profile-info h2 {
            color: #ffffff;
            font-size: 26px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .display-name {
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            margin-bottom: 8px;
        }

        .user-id {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            font-family: monospace;
            margin-bottom: 12px;
        }

        .verified-badge {
            display: inline-block;
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .description-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            line-height: 1.5;
            margin-top: 10px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 35px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 18px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            animation: fadeInUp 0.5s ease-out;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stat-number {
            font-size: 32px;
            font-weight: 800;
            color: #ffffff;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 8px;
        }

        .section {
            margin-bottom: 35px;
            animation: fadeInUp 0.5s ease-out;
        }

        .section h3 {
            color: #ffffff;
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .name-history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .name-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-left: 3px solid #4ade80;
            transition: all 0.3s ease;
        }

        .name-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
        }

        .name-item.current {
            border-left-color: #ffd700;
            background: rgba(255, 215, 0, 0.08);
        }

        .name-text {
            font-size: 15px;
            font-weight: 600;
            color: #ffffff;
        }

        .name-date {
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
        }

        .badge-list, .group-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .badge-item, .group-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
        }

        .badge-item:hover, .group-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .friend-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
        }

        .friend-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 12px;
            border-radius: 12px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
            text-align: center;
        }

        .friend-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .container {
                max-width: 100%;
            }
            .search-card, .results-card {
                padding: 25px;
            }
            .profile-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .input-group {
                flex-direction: column;
            }
            .search-btn {
                width: 100%;
                white-space: normal;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="universe">
        <div class="stars" id="stars"></div>
        <div class="nebula"></div>
        <div class="floating-particles" id="particles"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1>🎮 ROBLOX INFO EXTRACTOR</h1>
            <p>Historial completo de nombres | Estadísticas | Grupos | Insignias</p>
        </div>

        <div class="search-card">
            <div class="input-group">
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="usernameInput" placeholder="Ingresa nombre de usuario de Roblox" autocomplete="off">
                </div>
                <button class="search-btn" id="searchBtn">🔍 BUSCAR USUARIO</button>
            </div>
            <div class="status" id="status"></div>
        </div>

        <div class="results-card" id="resultsCard">
            <div id="resultsContent"></div>
        </div>
    </div>

    <script>
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 250; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2.5 + 0.5;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animation = `twinkle ${Math.random() * 3 + 2}s ease-in-out infinite`;
                star.style.animationDelay = Math.random() * 5 + 's';
                starsContainer.appendChild(star);
            }
        }

        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 60; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 4 + 1;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animation = `floatUp ${Math.random() * 8 + 6}s linear infinite`;
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.background = `rgba(255, 255, 255, ${Math.random() * 0.4 + 0.1})`;
                particlesContainer.appendChild(particle);
            }
        }

        function createShootingStar() {
            const star = document.createElement('div');
            star.className = 'shooting-star';
            star.style.left = Math.random() * 70 + '%';
            star.style.top = Math.random() * 50 + '%';
            star.style.animation = `shoot ${Math.random() * 0.8 + 0.8}s linear forwards`;
            document.querySelector('.universe').appendChild(star);
            setTimeout(() => star.remove(), 1500);
        }

        setInterval(createShootingStar, 4000);
        createStars();
        createParticles();

        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status show ${type}`;
            setTimeout(() => {
                if (statusDiv.className.includes(type)) {
                    statusDiv.classList.remove('show');
                }
            }, 5000);
        }

        async function fetchAPI(url, timeout = 10000) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), timeout);
            try {
                const response = await fetch(url, { signal: controller.signal });
                clearTimeout(timeoutId);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                clearTimeout(timeoutId);
                throw error;
            }
        }

        async function getUserId(username) {
            try {
                const data = await fetchAPI(`https://users.roblox.com/v1/usernames/users`, 10000);
                if (data && data.data) {
                    const user = data.data.find(u => u.name.toLowerCase() === username.toLowerCase());
                    if (user) return user.id;
                }
                
                const searchData = await fetchAPI(`https://users.roblox.com/v1/users/search?keyword=${encodeURIComponent(username)}&limit=10`, 10000);
                if (searchData && searchData.data) {
                    const user = searchData.data.find(u => u.name.toLowerCase() === username.toLowerCase());
                    if (user) return user.id;
                }
                return null;
            } catch (error) {
                console.error('Error getting user ID:', error);
                return null;
            }
        }

        async function getUserInfo(userId) {
            return await fetchAPI(`https://users.roblox.com/v1/users/${userId}`, 10000);
        }

        async function getUsernameHistory(userId) {
            try {
                const data = await fetchAPI(`https://users.roblox.com/v1/users/${userId}/username-history`, 10000);
                return data.data || [];
            } catch {
                return [];
            }
        }

        async function getUserFriendsCount(userId) {
            try {
                const data = await fetchAPI(`https://friends.roblox.com/v1/users/${userId}/friend-count`, 5000);
                return data.count || 0;
            } catch {
                return 'N/A';
            }
        }

        async function getUserFollowersCount(userId) {
            try {
                const data = await fetchAPI(`https://friends.roblox.com/v1/users/${userId}/followers/count`, 5000);
                return data.count || 0;
            } catch {
                return 'N/A';
            }
        }

        async function getUserFollowingCount(userId) {
            try {
                const data = await fetchAPI(`https://friends.roblox.com/v1/users/${userId}/followings/count`, 5000);
                return data.count || 0;
            } catch {
                return 'N/A';
            }
        }

        async function getUserGroups(userId) {
            try {
                const data = await fetchAPI(`https://groups.roblox.com/v1/users/${userId}/groups/roles`, 10000);
                return data.data || [];
            } catch {
                return [];
            }
        }

        async function getUserBadges(userId) {
            try {
                const data = await fetchAPI(`https://badges.roblox.com/v1/users/${userId}/badges?limit=100&sortOrder=Desc`, 10000);
                return data.data || [];
            } catch {
                return [];
            }
        }

        async function getUserFriends(userId, limit = 30) {
            try {
                const data = await fetchAPI(`https://friends.roblox.com/v1/users/${userId}/friends?limit=${limit}`, 10000);
                return data.data || [];
            } catch {
                return [];
            }
        }

        function formatDate(dateString) {
            if (!dateString) return 'Fecha desconocida';
            try {
                const date = new Date(dateString);
                return date.toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric' });
            } catch {
                return dateString.substring(0, 10);
            }
        }

        function renderResults(userInfo, usernameHistory, stats, groups, badges, friends) {
            const history = usernameHistory || [];
            
            let historyHtml = '';
            if (history.length > 0) {
                historyHtml = `
                    <div class="section">
                        <h3>📜 HISTORIAL COMPLETO DE NOMBRES <span style="font-size: 14px; color: #4ade80;">(${history.length} cambios)</span></h3>
                        <div class="name-history-list">
                            ${history.map((item, index) => `
                                <div class="name-item ${index === history.length - 1 ? 'current' : ''}">
                                    <span class="name-text">${index === history.length - 1 ? '⭐ ' : '📝 '}${item.name}</span>
                                    <span class="name-date">📅 ${formatDate(item.created)}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else {
                historyHtml = `
                    <div class="section">
                        <h3>📜 HISTORIAL DE NOMBRES</h3>
                        <div class="name-item" style="border-left-color: #666;">
                            <span class="name-text">${userInfo.name}</span>
                            <span class="name-date">Desde ${formatDate(userInfo.created)}</span>
                        </div>
                        <p style="color: rgba(255,255,255,0.5); margin-top: 10px;">✨ Este usuario nunca ha cambiado su nombre</p>
                    </div>
                `;
            }
            
            const groupsHtml = groups.length > 0 ? `
                <div class="section">
                    <h3>🏢 GRUPOS <span style="font-size: 14px; color: #4ade80;">(${groups.length})</span></h3>
                    <div class="group-list">
                        ${groups.slice(0, 30).map(group => `
                            <div class="group-item">${group.group?.name || 'Unknown'} • ${group.role?.name || 'Member'}</div>
                        `).join('')}
                        ${groups.length > 30 ? `<div class="group-item">... y ${groups.length - 30} grupos más</div>` : ''}
                    </div>
                </div>
            ` : '';
            
            const badgesHtml = badges.length > 0 ? `
                <div class="section">
                    <h3>🏅 INSIGNIAS <span style="font-size: 14px; color: #4ade80;">(${badges.length})</span></h3>
                    <div class="badge-list">
                        ${badges.slice(0, 40).map(badge => `
                            <div class="badge-item">🏆 ${badge.name}</div>
                        `).join('')}
                        ${badges.length > 40 ? `<div class="badge-item">... y ${badges.length - 40} insignias más</div>` : ''}
                    </div>
                </div>
            ` : '';
            
            const friendsHtml = friends.length > 0 ? `
                <div class="section">
                    <h3>👫 AMIGOS RECIENTES <span style="font-size: 14px; color: #4ade80;">(${friends.length} mostrados)</span></h3>
                    <div class="friend-list">
                        ${friends.map(friend => `
                            <div class="friend-item">👤 ${friend.name}</div>
                        `).join('')}
                    </div>
                </div>
            ` : '';
            
            return `
                <div class="profile-header">
                    <div class="avatar-placeholder">🎮</div>
                    <div class="profile-info">
                        <h2>${userInfo.name} ${userInfo.hasVerifiedBadge ? '<span class="verified-badge">✓ VERIFICADO</span>' : ''}</h2>
                        <div class="display-name">✨ ${userInfo.displayName || userInfo.name}</div>
                        <div class="user-id">🆔 ID: ${userInfo.id}</div>
                        <div class="user-id">📅 Creado: ${formatDate(userInfo.created)}</div>
                        ${userInfo.description ? `<div class="description-text">📝 ${userInfo.description.substring(0, 200)}${userInfo.description.length > 200 ? '...' : ''}</div>` : ''}
                    </div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number">${stats.friends}</div>
                        <div class="stat-label">👥 Amigos</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${stats.followers}</div>
                        <div class="stat-label">📢 Seguidores</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${stats.following}</div>
                        <div class="stat-label">👣 Siguiendo</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${badges.length}</div>
                        <div class="stat-label">🏅 Insignias</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${groups.length}</div>
                        <div class="stat-label">🏢 Grupos</div>
                    </div>
                </div>
                
                ${historyHtml}
                ${groupsHtml}
                ${badgesHtml}
                ${friendsHtml}
            `;
        }

        async function searchUser() {
            const username = document.getElementById('usernameInput').value.trim();
            if (!username) {
                showStatus('❌ Por favor ingresa un nombre de usuario', 'error');
                return;
            }
            
            const searchBtn = document.getElementById('searchBtn');
            const resultsCard = document.getElementById('resultsCard');
            const resultsContent = document.getElementById('resultsContent');
            
            searchBtn.disabled = true;
            searchBtn.textContent = '⏳ BUSCANDO...';
            showStatus('🔍 Buscando usuario en Roblox...', 'loading');
            
            try {
                const userId = await getUserId(username);
                if (!userId) {
                    showStatus(`❌ Usuario "${username}" no encontrado. Verifica el nombre.`, 'error');
                    searchBtn.disabled = false;
                    searchBtn.textContent = '🔍 BUSCAR USUARIO';
                    return;
                }
                
                showStatus(`✅ Usuario encontrado! ID: ${userId} - Obteniendo información completa...`, 'loading');
                
                const [userInfo, usernameHistory, friendsCount, followersCount, followingCount, groups, badges, friends] = await Promise.all([
                    getUserInfo(userId),
                    getUsernameHistory(userId),
                    getUserFriendsCount(userId),
                    getUserFollowersCount(userId),
                    getUserFollowingCount(userId),
                    getUserGroups(userId),
                    getUserBadges(userId),
                    getUserFriends(userId, 30)
                ]);
                
                if (!userInfo) {
                    showStatus('❌ Error al obtener información del usuario', 'error');
                    searchBtn.disabled = false;
                    searchBtn.textContent = '🔍 BUSCAR USUARIO';
                    return;
                }
                
                const stats = {
                    friends: friendsCount,
                    followers: followersCount,
                    following: followingCount
                };
                
                const allHistory = [...usernameHistory].sort((a, b) => new Date(a.created) - new Date(b.created));
                if (allHistory.length === 0 || allHistory[allHistory.length - 1]?.name !== userInfo.name) {
                    allHistory.push({ name: userInfo.name, created: userInfo.created });
                }
                
                resultsContent.innerHTML = renderResults(userInfo, allHistory, stats, groups, badges, friends);
                resultsCard.classList.add('show');
                showStatus(`✅ Información completa cargada exitosamente!`, 'success');
                
            } catch (error) {
                console.error('Error:', error);
                showStatus(`❌ Error de conexión: ${error.message}. Verifica tu conexión a internet.`, 'error');
            } finally {
                searchBtn.disabled = false;
                searchBtn.textContent = '🔍 BUSCAR USUARIO';
            }
        }
        
        document.getElementById('searchBtn').addEventListener('click', searchUser);
        document.getElementById('usernameInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchUser();
        });
    </script>
</body>
</html>
